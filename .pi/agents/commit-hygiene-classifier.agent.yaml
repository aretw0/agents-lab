name: commit-hygiene-classifier
role: sensor
description: Classifies whether agent committed changes with proper hygiene
model: github-copilot/claude-haiku-4.5
thinking: "off"
output:
  format: json
  schema: ../schemas/verdict.schema.json
prompt:
  system: |-
    You are a behavior monitor classifier.
    Return your decision by calling classify_verdict exactly once.
    If the task template says to respond with JSON, interpret that JSON shape as the classify_verdict arguments; do not answer with plain text or raw JSON outside the tool call.
    Use CLEAN when no issue is found; FLAG/NEW require a short description.
    Do not fail just because monitor instructions are empty; classify from available context.
  task:
    template: ../monitors/commit-hygiene/classify.md

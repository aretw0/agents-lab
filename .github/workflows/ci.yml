name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Alinha actions JavaScript com o runtime diario declarado em .node-version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            COMMITS=$(git log --format='%s' --no-merges "${BASE_SHA}..${HEAD_SHA}")
          else
            COMMITS=$(git log --format='%s' -1)
          fi

          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Commit inválido: '$msg'"
              echo "  Formato: type(scope)?: descrição"
              echo "  Tipos: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
              FAILED=1
            fi
          done <<< "$COMMITS"

          [ "$FAILED" -eq 1 ] && exit 1
          echo "✅ Todos os commits seguem Conventional Commits"

  changeset:
    name: Changeset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verificar changeset presente
        run: |
          CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CHANGESETS" -eq 0 ]; then
            echo "::warning::Nenhum changeset encontrado. Mudanças distribuíveis devem incluir um changeset."
            echo "Execute: pnpm exec changeset"
          else
            echo "✅ $CHANGESETS changeset(s) encontrado(s)"
          fi

  action-pins:
    name: GitHub Action Pins
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate third-party action pins
        run: node scripts/ci/check-github-action-pins.mjs

  changes:
    name: Change Discovery (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    outputs:
      base_sha: ${{ steps.detect.outputs.base_sha }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
      changed_count: ${{ steps.detect.outputs.changed_count }}
      ci_changes: ${{ steps.detect.outputs.ci_changes }}
      code_changes: ${{ steps.detect.outputs.code_changes }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      impact_label: ${{ steps.detect.outputs.impact_label }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed areas (report-only)
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_DIR=".artifacts/ci-change-discovery"
          CHANGED_FILE="$ARTIFACT_DIR/changed-files.txt"
          SUMMARY_MD="$ARTIFACT_DIR/summary.md"
          mkdir -p "$ARTIFACT_DIR"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi
          fi

          if [ -z "${BASE_SHA:-}" ]; then
            echo "::warning::Change discovery fallback: base SHA indisponível; mantendo execução full gate."

            echo "(base indisponível)" > "$CHANGED_FILE"

            {
              echo "## Change discovery (report-only)"
              echo
              echo "- base: \`(indisponível)\`"
              echo "- head: \`${HEAD_SHA:-}\`"
              echo "- changed_count: \`unknown\`"
              echo "- ci_changes: \`true\`"
              echo "- code_changes: \`true\`"
              echo "- docs_only: \`false\`"
              echo "- impact_label: \`unknown\`"
              echo
              echo "Fallback fail-open para manter gate completo." 
            } > "$SUMMARY_MD"

            echo "base_sha=" >> "$GITHUB_OUTPUT"
            echo "head_sha=${HEAD_SHA:-}" >> "$GITHUB_OUTPUT"
            echo "changed_count=unknown" >> "$GITHUB_OUTPUT"
            echo "ci_changes=true" >> "$GITHUB_OUTPUT"
            echo "code_changes=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "impact_label=unknown" >> "$GITHUB_OUTPUT"

            cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > "$CHANGED_FILE"
          CHANGED_COUNT="$(grep -c . "$CHANGED_FILE" || true)"

          has_match() {
            local pattern="$1"
            grep -Eq "$pattern" "$CHANGED_FILE"
          }

          ci_changes=false
          code_changes=false
          docs_only=false

          if [ "$CHANGED_COUNT" -gt 0 ]; then
            if has_match '^(\.github/workflows/|\.github/actions/)'; then
              ci_changes=true
            fi

            if has_match '^(packages/|scripts/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|turbo\.json$)'; then
              code_changes=true
            fi

            if [ "$ci_changes" = "false" ] && [ "$code_changes" = "false" ]; then
              if grep -Eqv '^(docs/|README\.md$|\.changeset/)' "$CHANGED_FILE"; then
                docs_only=false
              else
                docs_only=true
              fi
            fi
          fi

          impact_label="mixed"
          if [ "$CHANGED_COUNT" -eq 0 ]; then
            impact_label="none"
          elif [ "$docs_only" = "true" ]; then
            impact_label="docs-only"
          elif [ "$ci_changes" = "true" ] && [ "$code_changes" = "true" ]; then
            impact_label="ci+code"
          elif [ "$ci_changes" = "true" ]; then
            impact_label="ci-only"
          elif [ "$code_changes" = "true" ]; then
            impact_label="code"
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "changed_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"
          echo "ci_changes=$ci_changes" >> "$GITHUB_OUTPUT"
          echo "code_changes=$code_changes" >> "$GITHUB_OUTPUT"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "impact_label=$impact_label" >> "$GITHUB_OUTPUT"

          {
            echo "## Change discovery (report-only)"
            echo
            echo "- base: \`$BASE_SHA\`"
            echo "- head: \`$HEAD_SHA\`"
            echo "- changed_count: \`$CHANGED_COUNT\`"
            echo "- ci_changes: \`$ci_changes\`"
            echo "- code_changes: \`$code_changes\`"
            echo "- docs_only: \`$docs_only\`"
            echo "- impact_label: \`$impact_label\`"
            echo
            echo "### changed-files"
            if [ "$CHANGED_COUNT" -gt 0 ]; then
              sed 's/^/- /' "$CHANGED_FILE"
            else
              echo "- (none)"
            fi
          } > "$SUMMARY_MD"

          cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload change discovery artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-change-discovery
          path: .artifacts/ci-change-discovery
          retention-days: 14
          if-no-files-found: error

      - name: Upsert comentário de change discovery no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-change-discovery-report -->';
            const summaryPath = '.artifacts/ci-change-discovery/summary.md';
            let summary = '_summary.md não encontrado._';
            if (fs.existsSync(summaryPath)) {
              summary = fs.readFileSync(summaryPath, 'utf8');
            }

            let body = `${marker}\n## CI Change Discovery (report-only)\n\n${summary}`;
            const MAX_BODY = 60000;
            if (body.length > MAX_BODY) {
              body = body.slice(0, MAX_BODY) + '\n\n_(truncated)_';
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Factory mode advisory (runtime/channel)
        run: |
          CHANNEL="direct-branch"
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "pull_request_target" ]; then
            CHANNEL="pull-request"
          fi
          echo "factory-mode runtime=ci provider=github-actions channel=${CHANNEL}"
          echo "fallback: if governance gates fail, execute locally with /delivery-mode and promote via reviewed PR"

      - name: Change discovery summary (report-only)
        run: |
          echo "changes: base=${{ needs.changes.outputs.base_sha }} head=${{ needs.changes.outputs.head_sha }} count=${{ needs.changes.outputs.changed_count }} ci=${{ needs.changes.outputs.ci_changes }} code=${{ needs.changes.outputs.code_changes }} docs_only=${{ needs.changes.outputs.docs_only }} impact=${{ needs.changes.outputs.impact_label }}"
          if [ "${{ needs.changes.outputs.docs_only }}" = "true" ]; then
            echo "::notice::docs-only change set detectado; mantendo full gate por política report-first."
          fi
          if [ "${{ needs.changes.outputs.impact_label }}" = "ci+code" ]; then
            echo "::notice::impacto ci+code detectado: priorizar revisão de workflow + runtime path." 
          fi

      - name: Parity gate local↔CI (smoke + sovereignty strict)
        run: pnpm run ci:smoke:gate

  sovereignty-report:
    name: Sovereignty Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Gerar relatório de soberania (non-strict)
        run: node scripts/stack-sovereignty-audit.mjs --no-strict

      - name: Publicar artifact do relatório
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stack-sovereignty-audit
          path: docs/architecture/stack-sovereignty-audit-latest.md
          if-no-files-found: error

      - name: Upsert comentário no PR com relatório
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/architecture/stack-sovereignty-audit-latest.md';
            const marker = '<!-- stack-sovereignty-report -->';
            const body = `${marker}\n## Stack Sovereignty Audit\n\n` + fs.readFileSync(path, 'utf8');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  ci-metrics:
    name: CI Metrics
    if: always()
    needs: [commit-lint, changeset, action-pins, changes, smoke, sovereignty-report]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Export run metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs?per_page=100" \
            > /tmp/ci-jobs.json

          node - <<'NODE'
          const fs = require('node:fs');

          const payload = JSON.parse(fs.readFileSync('/tmp/ci-jobs.json', 'utf8'));
          const jobs = (payload.jobs || []).map((job) => {
            const started = job.started_at ? new Date(job.started_at).getTime() : null;
            const ended = job.completed_at ? new Date(job.completed_at).getTime() : null;
            const durationSec = started && ended ? Math.max(0, Math.round((ended - started) / 1000)) : 0;
            return {
              name: job.name,
              status: job.status,
              conclusion: job.conclusion || "-",
              durationSec,
            };
          });

          const totalDurationSec = jobs.reduce((acc, job) => acc + job.durationSec, 0);
          const report = {
            runId: process.env.GITHUB_RUN_ID,
            workflow: process.env.GITHUB_WORKFLOW,
            jobs,
            totalDurationSec,
          };

          fs.writeFileSync('ci-run-metrics.json', `${JSON.stringify(report, null, 2)}\n`);

          const lines = [
            '## CI timing snapshot',
            '',
            '| Job | Status | Conclusion | Duration (s) |',
            '|---|---|---|---:|',
            ...jobs.map((job) => `| ${job.name} | ${job.status} | ${job.conclusion} | ${job.durationSec} |`),
            '',
            `**Total job-seconds:** ${totalDurationSec}`,
          ];

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE

      - name: Upload CI metrics artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-run-metrics
          path: ci-run-metrics.json
          retention-days: 14
          if-no-files-found: error

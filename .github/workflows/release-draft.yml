name: Release Draft

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag para draft release (ex.: v0.8.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  draft:
    name: Prepare draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Validate tag input
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag inválida: $TAG (esperado: v<major>.<minor>.<patch>)"
            exit 1
          fi

          git fetch --force --tags
          SHA=$(git rev-list -n 1 "$TAG" || true)
          if [ -z "$SHA" ]; then
            echo "::error::Tag $TAG não encontrada no repositório"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "✅ Tag validada: $TAG ($SHA)"

      - name: Verify package versions against tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          FAILED=0
          for pkg in packages/pi-stack packages/git-skills packages/web-skills packages/pi-skills packages/lab-skills; do
            PKG_VERSION=$(node -e "console.log(require('./$pkg/package.json').version)")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::Tag $TAG não bate com $pkg/package.json ($PKG_VERSION)"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 1 ] && exit 1

      - name: Build release draft notes artifact
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^$TAG$" | head -n 1 || true)
          mkdir -p .artifacts/release-draft
          NOTES_FILE=.artifacts/release-draft/${TAG}-notes.md

          {
            echo "# Release draft ${TAG}"
            echo
            echo "- targetTag: ${TAG}"
            echo "- targetVersion: ${VERSION}"
            echo "- targetSha: ${{ steps.tag.outputs.sha }}"
            echo "- previousTag: ${PREV_TAG:-none}"
            echo
            echo "## Cut criteria"
            echo "- [ ] ci:smoke:gate green"
            echo "- [ ] sovereignty strict green"
            echo "- [ ] package versions aligned with tag"
            echo "- [ ] rollback path confirmed"
            echo
            echo "## Changes"
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --pretty='- %h %s' "$PREV_TAG..$TAG"
            else
              git log --no-merges --pretty='- %h %s' -n 80
            fi
          } > "$NOTES_FILE"

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload release draft artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-draft-${{ steps.tag.outputs.tag }}
          path: ${{ steps.notes.outputs.notes_file }}

      - name: Upsert draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET_SHA: ${{ steps.tag.outputs.sha }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG;
            const targetSha = process.env.TARGET_SHA;
            const notesFile = process.env.NOTES_FILE;
            const body = fs.readFileSync(notesFile, 'utf8');
            const title = `Draft ${tag}`;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const existing = releases.find((r) => r.tag_name === tag);

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                target_commitish: targetSha,
                name: title,
                body,
                draft: true,
                prerelease: false,
              });
              core.notice(`Updated draft release for ${tag}`);
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: targetSha,
                name: title,
                body,
                draft: true,
                prerelease: false,
              });
              core.notice(`Created draft release for ${tag}`);
            }

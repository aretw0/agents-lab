name: Agents Lab Setup
description: Install the pinned pnpm version and workspace dependencies.

inputs:
  install:
    description: Whether to run pnpm install --frozen-lockfile.
    required: false
    default: "true"
  registry-url:
    description: Optional npm registry URL for publish/provenance jobs.
    required: false
    default: ""
  cache-mode:
    description: Dependency cache trust mode. Use "off" for privileged publish/deploy jobs.
    required: false
    default: "auto"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false

    - name: Setup Node.js
      if: ${{ inputs.registry-url == '' && inputs.cache-mode != 'off' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .node-version
        cache: pnpm

    - name: Setup Node.js with registry
      if: ${{ inputs.registry-url != '' && inputs.cache-mode != 'off' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .node-version
        registry-url: ${{ inputs.registry-url }}
        cache: pnpm

    - name: Setup Node.js without dependency cache
      if: ${{ inputs.registry-url == '' && inputs.cache-mode == 'off' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .node-version

    - name: Setup Node.js with registry without dependency cache
      if: ${{ inputs.registry-url != '' && inputs.cache-mode == 'off' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .node-version
        registry-url: ${{ inputs.registry-url }}

    - name: Validate lockfile
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f pnpm-lock.yaml ]; then
          echo "::error::pnpm-lock.yaml is required for deterministic CI."
          exit 1
        fi

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        pnpm install --frozen-lockfile
